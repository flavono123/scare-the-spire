name: Cloudflare Workers Production

on:
  push:
    branches:
      - codex/cloudflare-workers-migration
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  deploy:
    name: Deploy migration branch to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: cloudflare-production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SITE_ORIGIN: ${{ vars.NEXT_PUBLIC_SITE_ORIGIN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SUPABASE_ENV: ${{ vars.NEXT_PUBLIC_SUPABASE_ENV || 'production' }}
      NEXT_PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN: ${{ secrets.NEXT_PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN || vars.NEXT_PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('package.json', 'next.config.*', 'open-next.config.*', 'wrangler.jsonc', 'tsconfig.json', 'src/**/*', 'data/**/*', 'public/**/*', 'scripts/**/*') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-next-

      - name: Validate Cloudflare production configuration
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$NEXT_PUBLIC_SITE_ORIGIN"
          test -n "$NEXT_PUBLIC_SUPABASE_URL"
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          test "$NEXT_PUBLIC_SUPABASE_ENV" = "production"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Compute Cloudflare build id
        run: |
          build_hash="$(
            git ls-files -z -- \
              package.json \
              pnpm-lock.yaml \
              next.config.ts \
              open-next.config.ts \
              wrangler.jsonc \
              tsconfig.json \
              postcss.config.mjs \
              src \
              data \
              public \
              scripts \
              | xargs -0 shasum -a 256 \
              | shasum -a 256 \
              | cut -c1-20
          )"

          echo "NEXT_BUILD_ID=cf-${build_hash}" >> "$GITHUB_ENV"
          echo "Cloudflare build id: cf-${build_hash}"

      - run: pnpm install --frozen-lockfile

      - run: pnpm i18n:validate

      - run: pnpm lint

      - name: Deploy to Cloudflare Workers
        run: pnpm cf:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke deployed Cloudflare Worker
        run: |
          origin="${NEXT_PUBLIC_SITE_ORIGIN%/}"

          smoke() {
            path="$1"
            url="${origin}${path}"

            for attempt in $(seq 1 30); do
              status="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" "$url" || true)"
              echo "smoke ${url}: HTTP ${status} (attempt ${attempt}/30)"
              case "$status" in
                2*|3*) return 0 ;;
              esac
              sleep 5
            done

            echo "smoke failed for ${url}"
            return 1
          }

          smoke "/"
          smoke "/compendium/cards"
          smoke "/generated/search-index.json"
